name: Gemini PR Reviewer

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'dependabot[bot]' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Fetch Base Branch
        run: |
          git fetch --no-tags --depth=50 origin "${{ github.event.pull_request.base.ref }}"

      - name: Compute Diff & Truncate
        id: diff
        env:
          # Limit diff to ~400k characters to avoid exceeding model context limits and speed up response
          CUTOFF_CHARS: "400000"
        run: |
          set -euo pipefail
          BASE_REF="origin/${{ github.event.pull_request.base.ref }}"
          
          # Get name-only diff first to see if anything changed
          CHANGED=$(git diff --name-only "$BASE_REF...HEAD" || true)
          if [ -z "$CHANGED" ]; then
            echo "No changes detected."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "should_run=true" >> "$GITHUB_OUTPUT"

          # Get raw diff excluding binary files or lockfiles
          RAW_DIFF=$(git diff "$BASE_REF...HEAD" -- ':(exclude)*.md' ':(exclude)*-lock.json' ':(exclude)*.lock' || true)
          TOTAL_CHARS=${#RAW_DIFF}
          
          if [ "$TOTAL_CHARS" -gt "$CUTOFF_CHARS" ]; then
            DIFF="${RAW_DIFF:0:$CUTOFF_CHARS}"
            TRUNCATED=true
          else
            DIFF="$RAW_DIFF"
            TRUNCATED=false
          fi

          # Save diff to a temporary file to avoid ARG_MAX issues in the environment
          DIFF_FILE="$RUNNER_TEMP/pr_diff.txt"
          printf '%s' "$DIFF" > "$DIFF_FILE"
          
          echo "diff_file=$DIFF_FILE" >> "$GITHUB_OUTPUT"
          echo "truncated=$TRUNCATED" >> "$GITHUB_OUTPUT"
          echo "total_chars=$TOTAL_CHARS" >> "$GITHUB_OUTPUT"

      - name: Call Ollama Cloud API
        id: ollama
        if: steps.diff.outputs.should_run == 'true'
        env:
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          DIFF_FILE: ${{ steps.diff.outputs.diff_file }}
          TRUNCATED: ${{ steps.diff.outputs.truncated }}
        run: |
          set -euo pipefail

          SYSTEM_PROMPT=$(cat <<'EOF'
          You are an expert code reviewer. Analyze the pull request diff.
          Point out critical logical bugs, security gaps, performance bottlenecks, or syntax formatting issues.
          Keep your responses highly constructive and conversational. Give clear code examples if suggesting fixes.
          
          Output format:
          - ## Summary: 2-3 sentence overview
          - ## Findings: Priority (P0/P1/P2) bullet points. Cite file path and line numbers.
          - ## Recommendation: Things to address before merging vs. things to do later.
          EOF
          )

          USER_PROMPT=$(cat <<EOF
          PR Title: $PR_TITLE

          PR Description:
          $PR_BODY

          Diff (truncated=$TRUNCATED):
          \`\`\`diff
          $(cat $DIFF_FILE)
          \`\`\`
          EOF
          )

          # Format request body using jq to securely handle diff contents and avoid shell injection
          BODY_FILE="$(mktemp)"
          trap 'rm -f "$BODY_FILE"' EXIT
          
          jq -n \
            --arg model "minimax-m3" \
            --arg prompt "$USER_PROMPT" \
            --arg system "$SYSTEM_PROMPT" \
            '{
              model: $model,
              prompt: $prompt,
              system: $system,
              stream: false
            }' > "$BODY_FILE"

          # Call Ollama Cloud API with retries to handle transient capacity errors
          for i in {1..3}; do
            RESPONSE=$(curl -sS \
              -X POST \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer $OLLAMA_API_KEY" \
              --data-binary "@$BODY_FILE" \
              "https://ollama.com/api/generate")
            
            # Check if API response contains an error
            ERROR_MSG=$(printf '%s' "$RESPONSE" | jq -r '.error // empty')
            if [ -z "$ERROR_MSG" ]; then
              break
            fi
            
            echo "Ollama Cloud API failed (attempt $i): $ERROR_MSG"
            if [ "$i" -lt 3 ]; then
              echo "Retrying in 10 seconds..."
              sleep 10
            fi
          done

          # Extract text response or print error details
          REVIEW_BODY=$(printf '%s' "$RESPONSE" | jq -r '
            if (.response // "") != "" then
              .response
            elif (.error // "") != "" then
              "Ollama API error: " + .error
            else
              "Failed to parse Ollama response: " + (. | tostring | .[0:500])
            end
          ')

          {
            echo 'review<<__REVIEW_EOF__'
            printf '%s\n' "$REVIEW_BODY"
            echo '__REVIEW_EOF__'
          } >> "$GITHUB_OUTPUT"

      - name: Post Review as PR Comment
        if: steps.diff.outputs.should_run == 'true'
        uses: actions/github-script@v7
        env:
          REVIEW: ${{ steps.ollama.outputs.review }}
          TRUNCATED: ${{ steps.diff.outputs.truncated }}
          TOTAL_CHARS: ${{ steps.diff.outputs.total_chars }}
        with:
          script: |
            const review = process.env.REVIEW || '_No review body generated._';
            const truncated = process.env.TRUNCATED === 'true';
            const totalChars = process.env.TOTAL_CHARS;
            
            const truncNote = truncated
              ? `\n\n> ⚠️ Diff was truncated (${Number(totalChars).toLocaleString()} characters total). Only the first 400,000 characters were sent to the model.`
              : '';
              
            const body = `🤖 **MiniMax M3 AI Code Reviewer**\n\n${review}${truncNote}\n\n---\n*This review was generated automatically using the minimax-m3 model via Ollama Cloud.*`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });