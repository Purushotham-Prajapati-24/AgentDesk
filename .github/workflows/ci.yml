name: Node.js CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        # --legacy-peer-deps prevents ERESOLVE conflicts between React 19 dev dependency 
        # and Next.js peer-dependency expectations.
        run: npm ci --legacy-peer-deps

      - name: Security audit check
        run: npm audit --audit-level=critical

      - name: Lint check
        run: npm run lint

      - name: Next.js Typecheck
        run: npx tsc --noEmit

      - name: SDK Typecheck
        run: npm run typecheck

      - name: Next.js Unit Tests
        run: npm run test

      - name: SDK Unit Tests
        run: npm run test:sdk

      - name: Production Build
        run: npm run build
